<!DOCTYPE html>
<html>
<head>
    <title>Update Employee</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="update-container">

    <h1>✏ Update Employee</h1>

    <form action="" method="POST">

        <label>Name</label>
        <input type="text"
               name="name"
               value="{{ employee.name }}"
               required>

        <label>Department</label>

        <select name="dept_id">

            {% for dept in departments %}

            <option value="{{ dept.dept_id }}"
                {% if dept.dept_id == employee.dept_id %}
                    selected
                {% endif %}
            >
                {{ dept.dept_name }}
            </option>

            {% endfor %}

        </select>

        <label>Salary</label>
        <input type="number"
               name="salary"
               value="{{ employee.salary }}"
               required>

        <label>City</label>
        <input type="text"
               name="city"
               value="{{ employee.city }}"
               required>

        <button type="submit" class="update-btn">
            Update Employee
        </button>

    </form>

</div>

</body>
</html>
